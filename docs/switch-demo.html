<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jet Switch · prueba</title>
<style>
  body{margin:0;background:#141517;min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:20px;font-family:system-ui,sans-serif;}
  .modulo{background:#0a0a0b;border-radius:34px;padding:22px 26px 18px;display:flex;
    flex-direction:column;align-items:center;gap:6px;box-shadow:0 10px 30px rgba(0,0,0,.5);}
  .titulo{font-size:12px;letter-spacing:2px;color:#8d9297;text-transform:uppercase;margin-bottom:4px;}
  /* --jet-s = escala del switch. Cambia solo este número para agrandar/achicar. */
  .switch{--jet-s:0.75;position:relative;
    width:calc(210px*var(--jet-s));height:calc(400px*var(--jet-s));
    cursor:grab;touch-action:none;-webkit-tap-highlight-color:transparent;}
  .capa{position:absolute;inset:0;background-repeat:no-repeat;transition:opacity .13s ease;}
  .c-cerrado{background-image:url('jet-cerrado-src.png');
    background-size:calc(354px*var(--jet-s)) calc(708px*var(--jet-s));
    background-position:calc(-72px*var(--jet-s)) calc(-159px*var(--jet-s));}
  .c-armado{background-image:url('jet-3estados.png');
    background-size:calc(1284px*var(--jet-s)) calc(729px*var(--jet-s));
    background-position:calc(-532px*var(--jet-s)) calc(-251px*var(--jet-s));opacity:0;}
  .c-abierto{background-image:url('jet-dos-src.png');
    background-size:calc(413px*var(--jet-s)) calc(827px*var(--jet-s));
    background-position:calc(-2px*var(--jet-s)) calc(-272px*var(--jet-s));opacity:0;}
  /* Bomba de búnker, blanca sólida, justo sobre "ENGAGE". */
  .bunker{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);color:#fff;line-height:0;}
  .bunker svg{width:calc(64px*var(--jet-s));height:calc(64px*var(--jet-s));stroke:#fff;stroke-width:3.4;}
  .bunker svg circle{fill:#fff;}
  .estado{font-size:18px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#f09595;min-height:24px;}
  .hint{font-size:12px;color:#8d9297;min-height:16px;text-align:center;letter-spacing:.4px;}
</style>
</head>
<body>
  <div class="modulo">
    <div class="titulo">Búnker</div>
    <div class="switch" id="sw">
      <div class="capa c-cerrado" id="cerrado">
        <div class="bunker"><svg viewBox="-4 0.5 40 40" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="25" r="10.5"/><path d="M12.8 15V12Q12.8 10.7 14.1 10.7H17.9Q19.2 10.7 19.2 12V15"/><path d="M16 10.7C15.5 6.5 22 5.5 23.5 9.2"/><path d="M23.5 9.2L27.2 6.9M23.5 9.2L28.2 10.1M23.5 9.2L25.1 5.5M23.5 9.2L25.5 12.8"/></svg></div>
      </div>
      <div class="capa c-armado" id="armado"></div>
      <div class="capa c-abierto" id="abierto"></div>
    </div>
  </div>
  <div class="estado" id="est">Cerrado</div>
  <div class="hint" id="hnt">Toca la tapa para levantarla</div>

<script>
(function(){
  var sw=document.getElementById('sw'),
      capas={0:document.getElementById('cerrado'),1:document.getElementById('armado'),2:document.getElementById('abierto')},
      est=document.getElementById('est'),hnt=document.getElementById('hnt');
  var COLOR=['#f09595','#f2c94c','#a5ff2e'],
      NOMBRE=['Cerrado','Armado','Abierto'],
      HINT=['Desliza la tapa hacia arriba','Desliza la palanca arriba para abrir · o la tapa abajo para cerrar','Abriendo…'];

  // Dos elementos <audio> separados, cada uno con su fuente ya puesta y
  // precargada (así la tapa se desbloquea y suena, como venía funcionando).
  // El TOGGLE va en WAV: su MP3 no sonaba en iPhone —Safari no lo reproducía—;
  // el WAV es un formato que iOS acepta siempre. La tapa sigue en MP3 (funciona).
  // El WAV del toggle ya trae los dos clicks (subir ~0s, bajar ~0.89s): un solo
  // play cubre el pulso — suena al abrir y el 2º click cae cuando vuelve (~1s).
  var aTapa=new Audio('click-tapa.mp3?v=3'); aTapa.preload='auto';
  var aToggle=new Audio('click-toggle.wav?v=2'); aToggle.preload='auto';
  function tocar(a){ try{ a.currentTime=0; var p=a.play(); if(p&&p.catch)p.catch(function(){}); }catch(e){} }
  function sonTapa(){ tocar(aTapa); }
  function sonTogglePulso(){ tocar(aToggle); }

  var idx=0,momentaryTimer=null;
  function pintar(){
    for(var k=0;k<3;k++)capas[k].style.opacity=(k===idx)?1:0;
    est.textContent=NOMBRE[idx];est.style.color=COLOR[idx];hnt.textContent=HINT[idx];
  }
  // Cambia de estado con el sonido de la pieza que se movió. (Sin vibración:
  // iPhone no la soporta desde web y aquí no aporta.)
  function ir(nuevo){
    var prev=idx; idx=nuevo;
    if((prev===0&&nuevo===1)||(prev===1&&nuevo===0)){ sonTapa(); }        // tapa (subir o bajar)
    else if(prev===1&&nuevo===2){ sonTogglePulso(); }                    // toggle: pulso completo (sube y baja)
    // prev===2 -> 1 (el resorte): sin sonido, el archivo ya trae el click de bajar
    pintar();
  }
  // El toggle es MOMENTARY: al subirlo dispara "Abierto" y vuelve solo a Armado
  // al segundo, con su click de retorno — como un portón, que es un pulso.
  function deslizarArriba(){
    if(momentaryTimer)return;             // esperando el resorte, no aceptar más
    if(idx===0){ ir(1); return; }         // tapa: cerrado -> armado
    if(idx===1){                          // toggle: armado -> abierto (pulso)
      ir(2);
      momentaryTimer=setTimeout(function(){ ir(1); momentaryTimer=null; },1000);
    }
  }
  function deslizarAbajo(){
    if(momentaryTimer)return;
    if(idx===1){ ir(0); }                 // tapa: armado -> cerrado
  }

  // Gesto de deslizar (touch y mouse). Arriba abre, abajo cierra la tapa.
  // La acción se dispara EN CUANTO se cruza el umbral durante el movimiento
  // (no al soltar), para que el sonido arranque antes y compense la latencia
  // del <audio> — así el click cae justo cuando la pieza se mueve.
  var y0=null, actuado=false;
  sw.addEventListener('pointerdown',function(e){ y0=e.clientY; actuado=false; sw.setPointerCapture&&sw.setPointerCapture(e.pointerId); });
  sw.addEventListener('pointermove',function(e){
    if(y0===null||actuado)return;
    var dy=e.clientY-y0;
    if(dy<-22){ actuado=true; deslizarArriba(); }
    else if(dy>22){ actuado=true; deslizarAbajo(); }
  });
  sw.addEventListener('pointerup',function(e){
    if(y0===null)return; var movido=actuado; y0=null; actuado=false;
    if(!movido)deslizarArriba();           // toque suave (sin arrastre) también abre
  });
  sw.addEventListener('pointercancel',function(){ y0=null; actuado=false; });
  pintar();
})();
</script>
</body>
</html>
