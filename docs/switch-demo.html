<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jet Switch · prueba</title>
<style>
  body{margin:0;background:#141517;min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:20px;font-family:system-ui,sans-serif;}
  .modulo{background:#0a0a0b;border-radius:20px;padding:22px 26px 18px;display:flex;
    flex-direction:column;align-items:center;gap:6px;box-shadow:0 10px 30px rgba(0,0,0,.5);}
  .titulo{font-size:12px;letter-spacing:2px;color:#8d9297;text-transform:uppercase;margin-bottom:4px;}
  .switch{position:relative;width:210px;height:400px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .capa{position:absolute;inset:0;background-repeat:no-repeat;transition:opacity .13s ease;}
  .c-cerrado{background-image:url('jet-cerrado-src.png');
    background-size:354px 708px;background-position:-72px -159px;}
  .c-armado{background-image:url('jet-3estados.png');
    background-size:1284px 729px;background-position:-532px -251px;opacity:0;}
  .c-abierto{background-image:url('jet-dos-src.png');
    background-size:413px 827px;background-position:-2px -272px;opacity:0;}
  .estado{font-size:18px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#f09595;min-height:24px;}
  .hint{font-size:12px;color:#8d9297;min-height:16px;text-align:center;letter-spacing:.4px;}
  .pop{animation:pop .18s ease;}
  @keyframes pop{50%{transform:scale(1.04)}}
</style>
</head>
<body>
  <div class="modulo">
    <div class="titulo">Portón Principal</div>
    <div class="switch" id="sw">
      <div class="capa c-cerrado" id="cerrado"></div>
      <div class="capa c-armado" id="armado"></div>
      <div class="capa c-abierto" id="abierto"></div>
    </div>
  </div>
  <div class="estado" id="est">Cerrado</div>
  <div class="hint" id="hnt">Toca la tapa para levantarla</div>

<script>
(function(){
  var sw=document.getElementById('sw'),
      capas={0:document.getElementById('cerrado'),1:document.getElementById('armado'),2:document.getElementById('abierto')},
      est=document.getElementById('est'),hnt=document.getElementById('hnt');
  var COLOR=['#f09595','#f2c94c','#a5ff2e'],
      NOMBRE=['Cerrado','Armado','Abierto'],
      HINT=['Toca la tapa para levantarla','Flipea la palanca para abrir · o baja la tapa','Flipea la palanca para cerrar'];

  // Sonidos sintetizados con Web Audio (sin archivos). El AudioContext se crea
  // en el primer toque porque los navegadores no dejan sonar antes de un gesto.
  var AC=null;
  function ac(){
    if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    return AC;
  }
  function ruido(c,dur,tipo,freq,q,vol){
    var n=Math.max(1,Math.floor(c.sampleRate*dur)),buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);
    for(var i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2);
    var s=c.createBufferSource();s.buffer=buf;
    var f=c.createBiquadFilter();f.type=tipo;f.frequency.value=freq;f.Q.value=q;
    var g=c.createGain();g.gain.value=vol;
    s.connect(f);f.connect(g);g.connect(c.destination);s.start();
  }
  function tono(c,freq,dur,tipo,vol){
    var o=c.createOscillator();o.type=tipo;var g=c.createGain(),t=c.currentTime;
    o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(Math.max(40,freq*0.55),t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur);
  }
  function sonTapa(){ try{var c=ac();ruido(c,0.045,'highpass',2600,1,0.32);tono(c,1500,0.05,'triangle',0.16);}catch(e){} }
  function sonToggle(){ try{var c=ac();ruido(c,0.06,'bandpass',560,2,0.3);tono(c,230,0.085,'square',0.22);tono(c,150,0.11,'sine',0.14);}catch(e){} }

  var idx=0,dir=1;
  function pintar(){
    for(var k=0;k<3;k++)capas[k].style.opacity=(k===idx)?1:0;
    est.textContent=NOMBRE[idx];est.style.color=COLOR[idx];hnt.textContent=HINT[idx];
    sw.classList.remove('pop');void sw.offsetWidth;sw.classList.add('pop');
  }
  sw.addEventListener('click',function(){
    var prev=idx;
    idx+=dir;
    if(idx>=2){idx=2;dir=-1;}else if(idx<=0){idx=0;dir=1;}
    var lo=Math.min(prev,idx),hi=Math.max(prev,idx);
    if(lo===0&&hi===1){ sonTapa(); if(navigator.vibrate)navigator.vibrate(15); }        // se movió la tapa
    else if(lo===1&&hi===2){ sonToggle(); if(navigator.vibrate)navigator.vibrate([25,15,40]); } // se movió el toggle
    pintar();
  });
  pintar();
})();
</script>
</body>
</html>
