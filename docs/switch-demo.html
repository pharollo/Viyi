<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jet Switch · prueba</title>
<style>
  body{margin:0;background:#141517;min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:20px;font-family:system-ui,sans-serif;}
  .modulo{background:#0a0a0b;border-radius:20px;padding:22px 26px 18px;display:flex;
    flex-direction:column;align-items:center;gap:6px;box-shadow:0 10px 30px rgba(0,0,0,.5);}
  .titulo{font-size:12px;letter-spacing:2px;color:#8d9297;text-transform:uppercase;margin-bottom:4px;}
  .switch{position:relative;width:210px;height:400px;cursor:grab;touch-action:none;-webkit-tap-highlight-color:transparent;}
  .capa{position:absolute;inset:0;background-repeat:no-repeat;transition:opacity .13s ease;}
  .c-cerrado{background-image:url('jet-cerrado-src.png');
    background-size:354px 708px;background-position:-72px -159px;}
  .c-armado{background-image:url('jet-3estados.png');
    background-size:1284px 729px;background-position:-532px -251px;opacity:0;}
  .c-abierto{background-image:url('jet-dos-src.png');
    background-size:413px 827px;background-position:-2px -272px;opacity:0;}
  .estado{font-size:18px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#f09595;min-height:24px;}
  .hint{font-size:12px;color:#8d9297;min-height:16px;text-align:center;letter-spacing:.4px;}
</style>
</head>
<body>
  <div class="modulo">
    <div class="titulo">Portón Principal</div>
    <div class="switch" id="sw">
      <div class="capa c-cerrado" id="cerrado"></div>
      <div class="capa c-armado" id="armado"></div>
      <div class="capa c-abierto" id="abierto"></div>
    </div>
  </div>
  <div class="estado" id="est">Cerrado</div>
  <div class="hint" id="hnt">Toca la tapa para levantarla</div>

<script>
(function(){
  var sw=document.getElementById('sw'),
      capas={0:document.getElementById('cerrado'),1:document.getElementById('armado'),2:document.getElementById('abierto')},
      est=document.getElementById('est'),hnt=document.getElementById('hnt');
  var COLOR=['#f09595','#f2c94c','#a5ff2e'],
      NOMBRE=['Cerrado','Armado','Abierto'],
      HINT=['Desliza la tapa hacia arriba','Desliza la palanca arriba para abrir · o la tapa abajo para cerrar','Abriendo…'];

  // Sonidos con elementos <audio> (HTMLAudio). Cada sonido se reproduce DIRECTO
  // dentro de su propio gesto (pointerup) — así es como iOS desbloquea el audio,
  // sin "cebado" previo (que fallaba con el archivo grande del toggle si aún no
  // había terminado de cargar). Se fuerza .load() para tenerlos listos.
  var aTapa=new Audio('click-tapa.mp3?v=3'), aToggle=new Audio('click-toggle.mp3?v=3');
  aTapa.preload='auto'; aToggle.preload='auto';
  try{ aTapa.load(); aToggle.load(); }catch(e){}
  function tocar(a){ try{ a.currentTime=0; var p=a.play(); if(p&&p.catch)p.catch(function(){}); }catch(e){} }
  function sonTapa(){ tocar(aTapa); }
  // El archivo del toggle ya trae los dos clicks (subir ~0s, bajar ~0.89s), así
  // que un solo play cubre el pulso: suena al abrir y el 2º click cae justo
  // cuando el momentary vuelve (~1s).
  function sonTogglePulso(){ tocar(aToggle); }

  var idx=0,momentaryTimer=null;
  function pintar(){
    for(var k=0;k<3;k++)capas[k].style.opacity=(k===idx)?1:0;
    est.textContent=NOMBRE[idx];est.style.color=COLOR[idx];hnt.textContent=HINT[idx];
  }
  // Cambia de estado con el sonido de la pieza que se movió. (Sin vibración:
  // iPhone no la soporta desde web y aquí no aporta.)
  function ir(nuevo){
    var prev=idx; idx=nuevo;
    if((prev===0&&nuevo===1)||(prev===1&&nuevo===0)){ sonTapa(); }        // tapa (subir o bajar)
    else if(prev===1&&nuevo===2){ sonTogglePulso(); }                    // toggle: pulso completo (sube y baja)
    // prev===2 -> 1 (el resorte): sin sonido, el archivo ya trae el click de bajar
    pintar();
  }
  // El toggle es MOMENTARY: al subirlo dispara "Abierto" y vuelve solo a Armado
  // al segundo, con su click de retorno — como un portón, que es un pulso.
  function deslizarArriba(){
    if(momentaryTimer)return;             // esperando el resorte, no aceptar más
    if(idx===0){ ir(1); return; }         // tapa: cerrado -> armado
    if(idx===1){                          // toggle: armado -> abierto (pulso)
      ir(2);
      momentaryTimer=setTimeout(function(){ ir(1); momentaryTimer=null; },1000);
    }
  }
  function deslizarAbajo(){
    if(momentaryTimer)return;
    if(idx===1){ ir(0); }                 // tapa: armado -> cerrado
  }

  // Gesto de deslizar (touch y mouse). Arriba abre, abajo cierra la tapa.
  var y0=null;
  sw.addEventListener('pointerdown',function(e){ y0=e.clientY; sw.setPointerCapture&&sw.setPointerCapture(e.pointerId); });
  sw.addEventListener('pointerup',function(e){
    if(y0===null)return; var dy=e.clientY-y0; y0=null;
    if(dy<-22)deslizarArriba();
    else if(dy>22)deslizarAbajo();
    else deslizarArriba();                // un toque suave también abre, para no frustrar
  });
  sw.addEventListener('pointercancel',function(){ y0=null; });
  pintar();
})();
</script>
</body>
</html>
