name: Desplegar backend a Firebase

# Frontend (docs/) lo publica GitHub Pages solo en cada push a main.
# Este workflow despliega SOLO el backend: Cloud Functions + reglas e índices de Firestore.
on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

# Evita despliegues pisándose si haces varios push seguidos.
concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Instalar dependencias de las functions
        working-directory: functions
        run: npm ci

      - name: Autenticar con Firebase (service account)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Desplegar functions y Firestore
        run: firebase deploy --only functions,firestore --project viyi-25a09 --non-interactive
